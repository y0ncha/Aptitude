$kind: http-request
order: 8000

method: POST
url: '{{baseUrl}}/fetch/metadata:batch'

headers:
  - key: Accept
    value: application/json
    description: Request immutable metadata in batch request order
  - key: Content-Type
    value: application/json
    description: Send the exact coordinate batch body
  - key: Authorization
    value: 'Bearer {{readToken}}'
    description: Authenticate with a caller that has the `read` scope

body:
  type: json
  content: |-
    {
      "coordinates": [
        {
          "slug": "{{sanity_primary_slug}}",
          "version": "{{sanity_version_2}}"
        },
        {
          "slug": "{{negative_missing_slug}}",
          "version": "{{negative_missing_version}}"
        }
      ]
    }

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      const [found, missing] = json.results;

      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Metadata batch returns ordered found and not_found results', () => {
        pm.expect(json.results).to.have.length(2);
        pm.expect(found.status).to.eql('found');
        pm.expect(found.coordinate.slug).to.eql(pm.collectionVariables.get('sanity_primary_slug'));
        pm.expect(found.coordinate.version).to.eql(pm.collectionVariables.get('sanity_version_2'));
        pm.expect(found.item.slug).to.eql(pm.collectionVariables.get('sanity_primary_slug'));
        pm.expect(found.item.version).to.eql(pm.collectionVariables.get('sanity_version_2'));
        pm.expect(found.item.metadata.name).to.eql('Postman Primary Skill');
        pm.expect(found.item.lifecycle_status).to.eql('deprecated');
        pm.expect(found.item.trust_tier).to.eql('untrusted');
        pm.expect(found.item).to.not.have.property('relationships');
        pm.expect(found.item).to.not.have.property('content_download_path');

        pm.expect(missing.status).to.eql('not_found');
        pm.expect(missing.coordinate.slug).to.eql(pm.collectionVariables.get('negative_missing_slug'));
        pm.expect(missing.coordinate.version).to.eql(
          pm.collectionVariables.get('negative_missing_version'),
        );
        pm.expect(missing.item).to.eql(null);
      });

      pm.execution.setNextRequest(
        pm.response.code === 200 ? 'Batch Fetch Published Skill Content' : null,
      );
