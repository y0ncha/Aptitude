$kind: http-request
order: 3000

method: POST
url: '{{baseUrl}}/skill-versions'

headers:
  - key: Accept
    value: application/json
    description: Expect the created immutable dependency version metadata
  - key: Content-Type
    value: application/json
    description: Send the normalized JSON publish contract

body:
  type: json
  content: |-
    {
      "slug": "{{sanity_dependency_slug}}",
      "version": "{{sanity_version_1}}",
      "content": {
        "raw_markdown": "# Postman Dependency Skill\n\nRun `{{runId}}` dependency version 1.\n",
        "rendered_summary": "Postman dependency skill."
      },
      "metadata": {
        "name": "Postman Dependency Skill",
        "description": "Dependency seed for relationship coverage",
        "tags": ["postman", "sanity", "dependency"],
        "headers": {
          "runtime": "python"
        },
        "inputs_schema": {
          "type": "object"
        },
        "outputs_schema": {
          "type": "object"
        },
        "token_estimate": 110,
        "maturity_score": 0.8,
        "security_score": 0.9
      },
      "relationships": {
        "depends_on": [],
        "extends": [],
        "conflicts_with": [],
        "overlaps_with": []
      }
    }

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 201', () => {
        pm.response.to.have.status(201);
      });

      pm.test('Dependency skill publish returns the created version', () => {
        pm.expect(json.slug).to.eql(pm.collectionVariables.get('sanity_dependency_slug'));
        pm.expect(json.version).to.eql(pm.collectionVariables.get('sanity_version_1'));
      });

      pm.execution.setNextRequest(pm.response.code === 201 ? 'Publish Extension Skill' : null);
