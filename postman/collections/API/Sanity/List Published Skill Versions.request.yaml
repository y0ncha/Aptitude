$kind: http-request
order: 9000

method: GET
url: '{{baseUrl}}/skills/{{sanity_primary_slug}}/versions'

headers:
  - key: Accept
    value: application/json
    description: Request the published versions for the generated sanity skill

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('List response contains the two published sanity versions in newest-first order', () => {
        const versions = json.versions.map((item) => item.version);
        pm.expect(json.slug).to.eql(pm.collectionVariables.get('sanity_primary_slug'));
        pm.expect(versions.slice(0, 2)).to.eql([
          pm.collectionVariables.get('sanity_version_2'),
          pm.collectionVariables.get('sanity_version_1'),
        ]);
      });

      pm.execution.setNextRequest(pm.response.code === 200 ? 'Fetch Published Skill Metadata' : null);
