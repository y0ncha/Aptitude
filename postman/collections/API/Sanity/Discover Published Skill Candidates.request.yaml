$kind: http-request
order: 10000

method: POST
url: '{{baseUrl}}/discovery'

headers:
  - key: Accept
    value: application/json
    description: Discover candidate slugs from name, description, and tags
  - key: Content-Type
    value: application/json
    description: Send the body-based discovery request
  - key: Authorization
    value: 'Bearer {{readToken}}'
    description: Authenticate with a caller that has the `read` scope

body:
  type: json
  content: |-
    {
      "name": "Postman Primary Skill",
      "description": "Primary sanity skill for collection coverage",
      "tags": ["postman", "sanity", "primary"]
    }

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Discovery returns the published primary slug candidate', () => {
        pm.expect(json.candidates).to.be.an('array').and.not.empty;
        pm.expect(json.candidates[0]).to.eql(pm.collectionVariables.get('sanity_primary_slug'));
      });

      pm.execution.setNextRequest(
        pm.response.code === 200 ? 'Resolve Published Skill Dependencies' : null,
      );
