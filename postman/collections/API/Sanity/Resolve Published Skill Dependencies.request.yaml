$kind: http-request
order: 11000

method: GET
url: '{{baseUrl}}/resolution/{{sanity_primary_slug}}/{{sanity_version_2}}'

headers:
  - key: Accept
    value: application/json
    description: Request the direct authored dependencies for the published version
  - key: Authorization
    value: 'Bearer {{readToken}}'
    description: Authenticate with a caller that has the `read` scope

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      const first = json.depends_on[0];

      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Resolution returns only direct depends_on declarations', () => {
        pm.expect(json.slug).to.eql(pm.collectionVariables.get('sanity_primary_slug'));
        pm.expect(json.version).to.eql(pm.collectionVariables.get('sanity_version_2'));
        pm.expect(json.depends_on).to.be.an('array').and.have.length(1);
        pm.expect(first.slug).to.eql(pm.collectionVariables.get('sanity_dependency_slug'));
        pm.expect(first.version).to.eql(pm.collectionVariables.get('sanity_version_1'));
        pm.expect(json).to.not.have.property('extends');
        pm.expect(json).to.not.have.property('relationships');
      });

      pm.execution.setNextRequest(pm.response.code === 200 ? 'Publish Invalid Request' : null);
