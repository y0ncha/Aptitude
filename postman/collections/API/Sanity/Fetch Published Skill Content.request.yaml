$kind: http-request
order: 11000

method: GET
url: '{{baseUrl}}/skills/{{sanity_primary_slug}}/versions/{{sanity_version_2}}/content'

headers:
  - key: Accept
    value: text/markdown
    description: Request the stored markdown body

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const body = pm.response.text();

      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Fetch content returns markdown with immutable caching headers', () => {
        pm.expect(body).to.include('Postman Primary Skill v2');
        pm.expect(body).to.include(pm.collectionVariables.get('runId'));
        pm.expect(pm.response.headers.get('Cache-Control')).to.eql('public, immutable');
        pm.expect(pm.response.headers.get('ETag')).to.be.a('string').and.not.empty;
      });

      pm.execution.setNextRequest(pm.response.code === 200 ? 'Search Published Skills' : null);
