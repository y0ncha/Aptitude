$kind: http-request
order: 10000

method: GET
url: '{{baseUrl}}/skills/{{sanity_primary_slug}}/versions/{{sanity_version_2}}'

headers:
  - key: Accept
    value: application/json
    description: Request the stored immutable skill version metadata

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Fetch metadata response matches the published version', () => {
        pm.expect(json.slug).to.eql(pm.collectionVariables.get('sanity_primary_slug'));
        pm.expect(json.version).to.eql(pm.collectionVariables.get('sanity_version_2'));
        pm.expect(json.metadata.name).to.eql('Postman Primary Skill');
        pm.expect(json.content.rendered_summary).to.eql('Postman primary skill version 2.');
        pm.expect(json.content_download_path).to.eql(
          `/skills/${pm.collectionVariables.get('sanity_primary_slug')}/versions/${pm.collectionVariables.get('sanity_version_2')}/content`,
        );
      });

      pm.execution.setNextRequest(pm.response.code === 200 ? 'Fetch Published Skill Content' : null);
