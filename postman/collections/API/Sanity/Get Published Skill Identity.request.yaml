$kind: http-request
order: 8000

method: GET
url: '{{baseUrl}}/skills/{{sanity_primary_slug}}'

headers:
  - key: Accept
    value: application/json
    description: Request the logical skill identity

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Identity response points at the latest published version', () => {
        pm.expect(json.slug).to.eql(pm.collectionVariables.get('sanity_primary_slug'));
        pm.expect(json.status).to.eql('published');
        pm.expect(json.current_version.version).to.eql(
          pm.collectionVariables.get('sanity_version_2'),
        );
      });

      pm.execution.setNextRequest(pm.response.code === 200 ? 'List Published Skill Versions' : null);
