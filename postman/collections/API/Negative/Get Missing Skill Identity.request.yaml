$kind: http-request
order: 3000

method: GET
url: '{{baseUrl}}/skills/{{negative_missing_slug}}'

headers:
  - key: Accept
    value: application/json
    description: Expect a normalized not-found error response for an unknown skill

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 404', () => {
        pm.response.to.have.status(404);
      });

      pm.test('Missing skill identity returns the normalized API error envelope', () => {
        pm.expect(json.error.code).to.eql('SKILL_NOT_FOUND');
        pm.expect(json.error.details.slug).to.eql(
          pm.collectionVariables.get('negative_missing_slug'),
        );
      });

      pm.execution.setNextRequest(pm.response.code === 404 ? 'List Invalid Skill Slug' : null);
