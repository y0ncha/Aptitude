$kind: http-request
order: 9000

method: POST
url: '{{baseUrl}}/resolution/relationships:batch'

headers:
  - key: Accept
    value: application/json
    description: Expect request validation to reject an empty coordinate list
  - key: Content-Type
    value: application/json
    description: Send an invalid relationship batch request body

body:
  type: json
  content: |-
    {
      "coordinates": []
    }

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 422', () => {
        pm.response.to.have.status(422);
      });

      pm.test('Invalid relationship batch returns the normalized validation envelope', () => {
        pm.expect(json.error.code).to.eql('INVALID_REQUEST');
        pm.expect(
          json.error.details.errors.some(
            (item) =>
              Array.isArray(item.loc) &&
              item.loc.includes('body') &&
              item.loc.includes('coordinates'),
          ),
        ).to.eql(true);
      });

      pm.execution.setNextRequest(
        pm.response.code === 422 ? 'Batch Relationships Not Found' : null,
      );
