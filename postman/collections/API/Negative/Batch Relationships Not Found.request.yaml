$kind: http-request
order: 10000

method: POST
url: '{{baseUrl}}/resolution/relationships:batch'

headers:
  - key: Accept
    value: application/json
    description: Expect a successful not-found result for an unknown coordinate
  - key: Content-Type
    value: application/json
    description: Send a valid relationship batch request body

body:
  type: json
  content: |-
    {
      "coordinates": [
        {
          "slug": "{{negative_missing_slug}}",
          "version": "{{negative_missing_version}}"
        }
      ]
    }

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      const result = json.results[0];

      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Unknown coordinate returns a not_found batch item', () => {
        pm.expect(result.status).to.eql('not_found');
        pm.expect(result.coordinate.slug).to.eql(pm.collectionVariables.get('negative_missing_slug'));
        pm.expect(result.coordinate.version).to.eql(
          pm.collectionVariables.get('negative_missing_version'),
        );
        pm.expect(result.relationships).to.eql(null);
      });

      pm.execution.setNextRequest(null);
