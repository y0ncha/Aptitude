$kind: http-request
order: 8000

method: GET
url: '{{baseUrl}}/discovery/skills/search'

headers:
  - key: Accept
    value: application/json
    description: Expect discovery validation to reject an empty selector set

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 422', () => {
        pm.response.to.have.status(422);
      });

      pm.test('Empty discovery search returns the normalized API error envelope', () => {
        pm.expect(json.error.code).to.eql('INVALID_REQUEST');
        pm.expect(json.error.details.errors).to.be.an('array').and.not.empty;
      });

      pm.execution.setNextRequest(
        pm.response.code === 422 ? 'Batch Relationships Invalid Request' : null,
      );
