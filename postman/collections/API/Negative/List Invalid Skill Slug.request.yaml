$kind: http-request
order: 4000

method: GET
url: '{{baseUrl}}/skills/{{invalid_slug}}/versions'

headers:
  - key: Accept
    value: application/json
    description: Expect request validation to reject the invalid skill slug

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 422', () => {
        pm.response.to.have.status(422);
      });

      pm.test('Invalid slug returns the normalized validation envelope', () => {
        pm.expect(json.error.code).to.eql('INVALID_REQUEST');
        pm.expect(
          json.error.details.errors.some(
            (item) =>
              Array.isArray(item.loc) &&
              item.loc.includes('path') &&
              item.loc.includes('slug'),
          ),
        ).to.eql(true);
      });

      pm.execution.setNextRequest(
        pm.response.code === 422 ? 'Fetch Missing Skill Version Metadata' : null,
      );
