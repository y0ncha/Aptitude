$kind: http-request
order: 6000

method: POST
url: '{{baseUrl}}/discovery'

headers:
  - key: Accept
    value: application/json
    description: Expect discovery validation to reject a missing required name
  - key: Content-Type
    value: application/json
    description: Send an invalid discovery request body
  - key: Authorization
    value: 'Bearer {{readToken}}'
    description: Authenticate with a caller that has the `read` scope

body:
  type: json
  content: |-
    {}

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 422', () => {
        pm.response.to.have.status(422);
      });

      pm.test('Missing discovery name returns the normalized API error envelope', () => {
        pm.expect(json.error.code).to.eql('INVALID_REQUEST');
        pm.expect(
          json.error.details.errors.some(
            (item) =>
              Array.isArray(item.loc) &&
              item.loc.includes('body') &&
              item.loc.includes('name'),
          ),
        ).to.eql(true);
      });

      pm.execution.setNextRequest(pm.response.code === 422 ? 'Resolve Invalid Version' : null);
