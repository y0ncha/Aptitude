$kind: http-request
order: 8000

method: GET
url: '{{baseUrl}}/resolution/{{negative_missing_slug}}/{{negative_missing_version}}'

headers:
  - key: Accept
    value: application/json
    description: Expect a normalized not-found error response for an unknown resolution coordinate
  - key: Authorization
    value: 'Bearer {{readToken}}'
    description: Authenticate with a caller that has the `read` scope

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 404', () => {
        pm.response.to.have.status(404);
      });

      pm.test('Missing resolution coordinate returns the normalized API error envelope', () => {
        pm.expect(json.error.code).to.eql('SKILL_VERSION_NOT_FOUND');
        pm.expect(json.error.details.slug).to.eql(
          pm.collectionVariables.get('negative_missing_slug'),
        );
        pm.expect(json.error.details.version).to.eql(
          pm.collectionVariables.get('negative_missing_version'),
        );
      });

      pm.execution.setNextRequest(null);
